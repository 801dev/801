<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>801 - IT Consulting & Web Development</title>
    <meta name="description" content="801 - Solusi Digital Terpercaya untuk bisnis Anda">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
        }
        .logo {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1;
        }
        .tagline {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid #22c55e;
            border-radius: 999px;
            color: #22c55e;
            font-size: 1rem;
            font-weight: 600;
        }
        .status::before {
            content: "●";
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .info {
            margin-top: 3rem;
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .info a {
            color: #3b82f6;
            text-decoration: none;
        }
        .info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">801</div>
        <p class="tagline">IT Consulting & Web Development</p>
        <span class="status">Website Sedang Dibangun</span>
        <p class="info">
            &copy; 2026 801 &mdash; Coming Soon 
            <a href="mailto:hello@801.pages.dev">hello@801.pages.dev</a>
        </p>
    </div>
</body>
</html>
